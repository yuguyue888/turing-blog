    url: "https://www.huxiu.com/rss/0.xml"
    category: "business"
    icon: "🐅"
    enabled: true

# RSS 抓取配置
fetch_config:
  timeout: 10000  # 10秒超时
  max_items: 10   # 每个源最多抓取10条
  retry_times: 3  # 失败重试3次
  delay: 1000     # 请求间隔1秒
