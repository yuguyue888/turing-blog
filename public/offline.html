<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - 图灵花园</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      font-size: 6rem;
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #818cf8;
    }
    
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .tips {
      background: rgba(129, 140, 248, 0.1);
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .tips h3 {
      color: #818cf8;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    
    .tips ul {
      list-style: none;
      text-align: left;
    }
    
    .tips li {
      padding: 0.5rem 0;
      color: #cbd5e1;
      font-size: 0.9rem;
    }
    
    .tips li::before {
      content: '✓ ';
      color: #818cf8;
      font-weight: bold;
      margin-right: 0.5rem;
    }
    
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 8px;
      font-size: 0.85rem;
      color: #64748b;
    }
    
    .status.online {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>哎呀，离线了</h1>
    <p>
      您当前处于离线状态，无法访问新内容。<br>
      不过别担心，之前访问过的页面仍可查看！
    </p>
    
    <div class="tips">
      <h3>💡 离线时您可以：</h3>
      <ul>
        <li>查看已缓存的文章内容</li>
        <li>浏览AI工具导航</li>
        <li>访问之前浏览过的页面</li>
      </ul>
    </div>
    
    <button class="btn" onclick="location.reload()">
      🔄 重试连接
    </button>
    
    <div class="status" id="status">
      正在检测网络状态...
    </div>
  </div>
  
  <script>
    // 检测网络状态
    function checkNetworkStatus() {
      const statusEl = document.getElementById('status')
      
      if (navigator.onLine) {
        statusEl.className = 'status online'
        statusEl.textContent = '✅ 网络已恢复，点击重试连接'
      } else {
        statusEl.className = 'status'
        statusEl.textContent = '❌ 仍处于离线状态'
      }
    }
    
    // 监听网络状态变化
    window.addEventListener('online', () => {
      checkNetworkStatus()
      // 自动刷新
      setTimeout(() => {
        location.reload()
      }, 1000)
    })
    
    window.addEventListener('offline', () => {
      checkNetworkStatus()
    })
    
    // 初始检测
    checkNetworkStatus()
  </script>
</body>
</html>
